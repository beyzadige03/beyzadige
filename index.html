<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÇERKEZKÖY BELEDİYESİ BOŞ PARK ALAN UYGULAMASI</title>
  <meta name="description" content="Arduino maketiyle eş zamanlı çalışan park yeri doluluk takibi uygulaması.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <p class="eyebrow">Akıllı Park Takibi</p>
      <h1>ÇERKEZKÖY BELEDİYESİ BOŞ PARK ALAN UYGULAMASI</h1>
      <p class="subtitle">Yeşil = Müsait · Kırmızı = Dolu / Özel Alan</p>
    </header>

    <main class="layout">
      <section class="panel" aria-labelledby="parkTitle">
        <h2 id="parkTitle">Park Alanları</h2>
        <div id="parkGrid" class="park-grid"></div>
      </section>

      <section class="panel" aria-live="polite">
        <h2>Sistem Durumu</h2>
        <p id="summary">Veriler bekleniyor...</p>
        <div id="notifications" class="notifications"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
